name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --console=plain

      - name: Build plugin
        run: ./gradlew buildPlugin --console=plain

      - name: Verify plugin compatibility
        # 抓「用了平台 class 卻沒宣告 module/plugin 依賴」這類編譯與單元測試都抓不到、
        # 只有真實 IDE 啟動才會爆的問題（如 JCEF 在 2026.x 拆成 bundled plugin 導致的啟動崩潰）
        run: ./gradlew verifyPlugin --console=plain

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: leetcode-editor-plugin
          path: build/distributions/*.zip
