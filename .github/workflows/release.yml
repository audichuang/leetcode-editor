name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
  push:
    tags:
      - 'v*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set LD_VERSION (from tag)
        if: ${{ github.event_name == 'push' }}
        run: echo "LD_VERSION=${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV
      - name: Set LD_VERSION (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "LD_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test, build and verify plugin
        run: ./gradlew test buildPlugin verifyPlugin --console=plain
        env:
          LD_VERSION: ${{ env.LD_VERSION }}

      - name: Create GitHub Release with plugin zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.LD_VERSION }}
          name: v${{ env.LD_VERSION }}
          draft: true
          files: build/distributions/leetcode-editor-${{ env.LD_VERSION }}.zip
